<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Apriori Dashboard</title>
    <!-- Premium Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Animated Aurora Background -->
    <div class="bg-container">
        <div class="bg-orb orb-1"></div>
        <div class="bg-orb orb-2"></div>
        <div class="bg-orb orb-3"></div>
    </div>
    
    <!-- Premium Noise Overlay -->
    <div class="bg-noise"></div>

    <div class="dashboard-layout">
        <!-- Sidebar Navigation -->
        <aside class="sidebar glass-panel">
            <div class="sidebar-header">
                <h1 class="gradient-text">Apriori Analysis</h1>
                <p class="subtitle">Hotel Booking Demand</p>
            </div>
            <nav class="sidebar-nav" id="step-nav">
                <div class="nav-item active" data-view="dashboard"><i class="fas fa-home"></i> Dashboard</div>
                <div class="nav-item" data-view="frequent_itemsets"><i class="fas fa-chart-line"></i> Frequent Itemsets</div>
                <div class="nav-item" data-view="association_rules"><i class="fas fa-link"></i> Association Rules</div>
                <div class="nav-item" data-view="cancel_rules"><i class="fas fa-times-circle"></i> Cancel Booking Analysis</div>
                <div class="nav-item" data-view="visualizations"><i class="fas fa-chart-bar"></i> Visualization</div>
                <div class="nav-item" data-view="business_insights"><i class="fas fa-lightbulb"></i> Business Insights</div>
            </nav>
        </aside>

        <!-- Main Content Area -->
        <main class="dashboard-main">
            <section class="pane pane-output glass-panel" id="pane-output">
                <div class="pane-header">
                    <h2 id="view-title"><i class="fas fa-home"></i> Dashboard</h2>
                </div>
                <div class="pane-content" id="output-content">
                    <!-- Dynamic content will be injected here -->
                </div>
            </section>
        </main>
    </div>

    <script src="dashboard_data.js"></script>
    <script src="script.js"></script>
</body>
</html>
